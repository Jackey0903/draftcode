    :root {
      --bg: #000402;
      --bg2: #020805;
      --panel: rgba(3, 18, 9, .76);
      --panel2: rgba(4, 30, 15, .58);
      --text: #f1fff7;
      --muted: #9dc6b1;
      --faint: #5c8470;
      --green: #37ff8b;
      --green-hot: #00ff66;
      --amber: #f1c96b;
      --cyan: #62f2ff;
      --red: #ff4473;
      --line: rgba(55, 255, 139, .20);
      --line-soft: rgba(55, 255, 139, .08);
      --shadow: 0 24px 80px rgba(0, 0, 0, .55);
      /* 得意黑 — 默认显示字体,承载所有可读标题与正文 */
      --display: "DeyiHei", "得意黑", "SmileySans-Oblique", "PingFang SC", "Microsoft YaHei", sans-serif;
      /* 像素字 — 只给没什么信息量的大字、编号、状态、数字、日志 */
      --pixel: "FusionPixel12", "OCR-A BT", ui-monospace, Menlo, Monaco, Consolas, monospace;
      /* 系统字 — 只给特别小的注脚与合规小字 */
      --body: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      background: #000;
    }
    body {
      color: var(--text);
      /* 剩下的都用得意黑:默认全局显示字体 */
      font-family: var(--display);
      overflow-x: hidden;
      background: #000;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { font: inherit; color: inherit; }
    h1, h2, h3, h4, p, ul { margin: 0; }
    ul { padding: 0; list-style: none; }

    /* 像素字工具类:大字标 / 机器标签 / 数字 */
    .px { font-family: var(--pixel); letter-spacing: .04em; }
    /* 特别小的字 → 系统默认字体 */
    .fine { font-family: var(--body); }

    /* ---------- 导航 ---------- */
    .progress {
      position: fixed; left: 0; top: 0; z-index: 80;
      height: 3px; width: 0;
      background: linear-gradient(90deg, var(--green-hot), var(--cyan));
      box-shadow: 0 0 16px rgba(55, 255, 139, .7);
      transition: width .2s ease;
    }
    .rail {
      position: fixed; right: clamp(10px, 1.5vw, 22px); top: 50%;
      transform: translateY(-50%); z-index: 70;
      display: grid; justify-items: center; gap: 12px;
    }
    .counter {
      color: rgba(241, 255, 247, .7);
      writing-mode: vertical-rl;
      font: 12px/1 var(--pixel); letter-spacing: .12em;
    }
    .counter b { color: var(--green); }
    .dots { display: grid; gap: 9px; }
    .dot {
      width: 9px; height: 9px; padding: 0; border-radius: 50%;
      border: 1px solid rgba(241, 255, 247, .32);
      background: rgba(0, 0, 0, .25); cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .dot:hover, .dot[aria-current="true"] {
      transform: scale(1.25);
      background: var(--green); border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(55, 255, 139, .12), 0 0 14px rgba(55, 255, 139, .7);
    }

    /* ---------- 幻灯片外壳 ---------- */
    .slide {
      position: relative; min-height: 100svh;
      scroll-snap-align: start; scroll-snap-stop: always;
      overflow: hidden; isolation: isolate;
      padding: clamp(18px, 3.2vh, 40px) clamp(24px, 4vw, 60px);
      display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(960px 540px at 78% 10%, rgba(0, 255, 102, .10), transparent 64%),
        radial-gradient(680px 480px at 8% 92%, rgba(98, 242, 255, .05), transparent 70%),
        var(--bg);
    }
    /* 细网格,内容页很淡 */
    .slide::before {
      content: ""; position: absolute; inset: 0; z-index: -5; pointer-events: none;
      background:
        linear-gradient(90deg, rgba(55, 255, 139, .05) 1px, transparent 1px) 0 0 / 72px 100%,
        linear-gradient(rgba(241, 255, 247, .02) 1px, transparent 1px) 0 0 / 100% 46px;
      opacity: .8;
      mask-image: radial-gradient(112% 92% at 50% 42%, #000 46%, transparent 100%);
    }
    .slide::after {
      content: ""; position: absolute; inset: 0; z-index: -3; pointer-events: none;
      opacity: .16;
      background: linear-gradient(transparent 50%, rgba(0, 0, 0, .14) 50%) 0 0 / 100% 4px;
    }
    .matrix {
      position: absolute; inset: 0; z-index: -6;
      width: 100%; height: 100%; opacity: .12;
    }
    .cover .matrix, .lock .matrix { opacity: .8; }
    .grain {
      position: absolute; inset: 0; z-index: 6; pointer-events: none;
      opacity: .16; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0.4 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    /* ---------- 内容页框架 ---------- */
    .frame {
      position: relative; z-index: 2;
      width: min(1240px, calc(100vw - clamp(44px, 9vw, 128px)));
      min-height: min(700px, calc(100svh - 40px));
      display: flex; flex-direction: column; gap: clamp(12px, 1.6vh, 20px);
    }
    .topline {
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      color: var(--muted);
      font: 12px/1.2 var(--pixel); letter-spacing: .1em;
    }
    .topline .tag {
      display: inline-flex; align-items: center; gap: 9px;
      color: var(--text); white-space: nowrap;
    }
    .topline .tag::before {
      content: ""; width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 14px rgba(55, 255, 139, .8);
    }
    .takeaway {
      border-top: 1px solid var(--line); padding-top: 13px;
      display: flex; align-items: baseline; gap: 14px;
      color: var(--text); font-size: clamp(14px, 1.4vw, 19px);
    }
    .takeaway b {
      flex: none; color: var(--green);
      font: 11px/1 var(--pixel); letter-spacing: .14em;
      transform: translateY(-1px);
    }

    .main { flex: 1; min-height: 0; display: grid; gap: clamp(16px, 3vw, 36px); align-items: stretch; }
    .main.split-2 { grid-template-columns: .92fr 1.08fr; }
    /* 整页内容布局:紧凑标题在上,内容填满下方,避免大玻璃框吃掉竖向空间 */
    .main.single { grid-template-columns: 1fr; grid-template-rows: auto minmax(0, 1fr); gap: clamp(14px, 2vh, 22px); }
    .main.single .hero { background: transparent; border: none; box-shadow: none; backdrop-filter: none; padding: 0; display: block; }
    .main.single .hero::after { display: none; }
    .main.single .title { font-size: clamp(32px, 4.4vw, 60px); margin-top: 12px; }
    .main.single .lead { margin-top: 12px; max-width: 56ch; font-size: clamp(16px, 1.8vw, 24px); }

    /* ---------- 玻璃面板 ---------- */
    .hero, .panel {
      position: relative; overflow: hidden;
      border: 1px solid var(--line); border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .04), transparent 38%), var(--panel);
      box-shadow: var(--shadow); backdrop-filter: blur(16px) saturate(1.15);
    }
    .hero { padding: clamp(26px, 3.6vw, 50px); display: flex; flex-direction: column; justify-content: center; }
    .panel { padding: clamp(16px, 2.2vw, 28px); display: flex; flex-direction: column; gap: 14px; }
    .hero::after, .panel::after {
      content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .3;
      background: linear-gradient(105deg, rgba(255, 255, 255, .1), transparent 26%, transparent 78%, rgba(55, 255, 139, .07));
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      color: var(--green);
      font: 12px/1 var(--pixel); letter-spacing: .12em;
    }
    .eyebrow::after { content: ""; width: 64px; height: 1px; background: linear-gradient(90deg, var(--green), transparent); }
    .title {
      margin-top: 16px; color: var(--text);
      font-size: clamp(40px, 6vw, 86px); line-height: .95;
      letter-spacing: -.02em; font-weight: 400;
    }
    .title .neq { color: var(--amber); padding: 0 .1em; }
    .lead {
      margin-top: 16px; color: var(--text);
      font-size: clamp(18px, 2.1vw, 29px); line-height: 1.24; max-width: 26ch;
    }
    .note { margin-top: 14px; color: var(--muted); font-size: clamp(13px, 1.3vw, 16px); max-width: 34ch; }

    /* ---------- 封面 / 锁定 (EVA) ---------- */
    .cover-kicker, .cover-tag, .vertical, .cover-fine {
      position: absolute; opacity: 0;
    }
    /* 封面/收尾的主文字成组、竖向居中 —— 避免中间大块空白 */
    .eva-stack {
      position: absolute;
      left: clamp(40px, 7vw, 104px);
      right: clamp(190px, 25vw, 380px);
      top: 0; bottom: 0;
      display: flex; flex-direction: column; justify-content: center;
      gap: clamp(14px, 2.4vh, 30px);
    }
    .eva-title, .cover-line { opacity: 0; }
    .cover-kicker {
      left: clamp(40px, 7vw, 104px); top: clamp(40px, 7vh, 72px);
      color: var(--green); font: 14px/1 var(--pixel); letter-spacing: .16em;
      text-shadow: 0 0 16px rgba(55, 255, 139, .65);
      animation: fadeUp .5s ease .1s forwards;
    }
    .cover-tag {
      right: clamp(36px, 6vw, 104px); top: clamp(42px, 7vh, 74px);
      color: var(--muted); font: 12px/1.5 var(--pixel); letter-spacing: .1em; text-align: right;
      animation: fadeUp .5s ease .2s forwards;
    }
    .cover-tag b { color: var(--text); }
    .eva-title {
      /* 字标也用 EVA 明朝体 + 同款故障辉光(参考 EVA_Matrix) */
      font-family: "Hiragino Mincho ProN", "Songti SC", "STSong", "MingLiU", serif;
      font-size: clamp(40px, 8.6vw, 130px); line-height: .84;
      font-weight: 900; letter-spacing: -.01em; color: #f6fffb; white-space: nowrap;
      -webkit-text-stroke: .4px rgba(255, 255, 255, .42);
      text-shadow:
        0 0 10px rgba(255, 255, 255, .62),
        0 0 30px rgba(0, 255, 102, .4),
        3px 0 rgba(255, 68, 115, .58),
        -3px 0 rgba(98, 242, 255, .46);
      animation: evaGlitch .6s cubic-bezier(.2, .85, .25, 1) .26s forwards;
    }
    .vertical {
      top: 11%; right: clamp(34px, 7vw, 118px);
      writing-mode: vertical-rl; text-orientation: upright;
      /* 繁体字沿用 EVA 明朝体(参考 EVA_Matrix),不用得意黑 */
      font-family: "Hiragino Mincho ProN", "Songti SC", "STSong", "MingLiU", serif;
      font-size: clamp(52px, 8.4vw, 142px); line-height: .9;
      font-weight: 900; letter-spacing: -.08em; color: #fff;
      -webkit-text-stroke: .35px rgba(255, 255, 255, .42);
      text-shadow:
        0 0 8px rgba(255, 255, 255, .68),
        0 0 28px rgba(0, 255, 102, .38),
        2px 0 rgba(255, 68, 115, .5),
        -2px 0 rgba(98, 242, 255, .35);
      animation: evaPop .55s cubic-bezier(.2, .85, .25, 1) .42s forwards;
    }
    .cover-line {
      margin-top: clamp(4px, 1vh, 12px);
      color: #fff; font-family: var(--display);
      font-size: clamp(20px, 2.7vw, 42px); font-weight: 400; letter-spacing: .01em;
      max-width: 24ch;
      text-shadow: 0 0 18px rgba(255, 255, 255, .32);
      animation: evaPop .5s cubic-bezier(.2, .85, .25, 1) .56s forwards;
    }
    .cover-fine {
      left: clamp(44px, 7vw, 110px); bottom: clamp(40px, 6vh, 64px);
      max-width: min(60ch, 70vw);
      color: var(--faint); font-size: 12px; line-height: 1.5;
      animation: fadeUp .5s ease .8s forwards;
    }
    .flash {
      position: absolute; inset: 0; z-index: 8; pointer-events: none;
      background: #fff; opacity: 0;
      animation: whiteFlash .5s ease-out .2s both;
    }

    /* ---------- S2 拆分 (天赋 ≠ 顺位) ---------- */
    .vs { height: 100%; display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: stretch; }
    .side {
      border: 1px solid var(--line); border-radius: 6px;
      background: rgba(0, 0, 0, .25); padding: clamp(18px, 2vw, 26px);
      display: grid; align-content: start; gap: 14px; overflow: hidden;
    }
    .side .role { color: var(--green); font: 12px/1 var(--pixel); letter-spacing: .12em; }
    .side h3 { font-size: clamp(26px, 3.4vw, 46px); line-height: 1; }
    .side ul { display: grid; gap: 9px; color: var(--muted); font-size: clamp(14px, 1.4vw, 17px); }
    .side li { display: flex; align-items: center; gap: 9px; }
    .side li::before { content: ""; width: 6px; height: 6px; background: var(--green); opacity: .7; }
    .divider { position: relative; width: 1px; background: linear-gradient(transparent, var(--green), transparent); }
    .divider span {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      color: var(--amber); font: 44px/1 var(--pixel);
      text-shadow: 0 0 16px rgba(241, 201, 107, .6);
    }
    .cases { display: grid; gap: 6px; }
    .case { color: var(--muted); font-size: 13px; }
    .case b { color: var(--amber); font-family: var(--pixel); font-size: 12px; letter-spacing: .04em; }

    /* ---------- S3 三路信号 ---------- */
    .signals { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .sig {
      border: 1px solid var(--line); border-radius: 6px;
      background: rgba(0, 0, 0, .25); padding: clamp(14px, 1.6vw, 20px);
      display: grid; gap: 10px; align-content: start;
    }
    .sig.money { border-color: rgba(241, 201, 107, .4); background: rgba(241, 201, 107, .05); }
    .sig .code { color: var(--green); font: 12px/1 var(--pixel); letter-spacing: .1em; }
    .sig.money .code { color: var(--amber); }
    .sig h3 { font-size: clamp(22px, 2.6vw, 34px); line-height: 1; }
    .sig dl { display: grid; grid-template-columns: auto 1fr; gap: 6px 12px; margin: 0; }
    .sig dt { color: var(--faint); font: 11px/1.5 var(--pixel); letter-spacing: .06em; }
    .sig dd { margin: 0; color: var(--muted); font-size: 14px; }
    .axes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .axis {
      border: 1px solid var(--line); border-left: 2px solid var(--amber); border-radius: 4px;
      background: rgba(0, 0, 0, .22); padding: 12px 14px;
    }
    .axis b { color: var(--amber); font: 11px/1 var(--pixel); letter-spacing: .08em; }
    .axis p { margin-top: 7px; color: var(--text); font-size: clamp(14px, 1.4vw, 17px); }
    .axis small { display: block; margin-top: 6px; color: var(--muted); font-size: 13px; }

    /* ---------- S4 创新点网格 ---------- */
    .grid5 { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 1fr; gap: 12px; height: 100%; }
    .edge {
      border: 1px solid var(--line); border-radius: 6px;
      background: rgba(0, 0, 0, .25); padding: clamp(16px, 1.8vw, 22px);
      display: flex; flex-direction: column; gap: 10px;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .edge:hover { transform: translateY(-2px); border-color: rgba(55, 255, 139, .5); box-shadow: 0 0 26px rgba(55, 255, 139, .12); }
    .edge .no { color: var(--green); font: clamp(28px, 3vw, 42px)/1 var(--pixel); }
    .edge h3 { font-size: clamp(19px, 1.9vw, 25px); line-height: 1.08; }
    .edge p { color: var(--muted); font-size: clamp(13px, 1.3vw, 15px); margin-top: auto; }
    .edge.main {
      grid-column: span 2; grid-row: span 2;
      border-color: rgba(55, 255, 139, .55);
      background: linear-gradient(150deg, rgba(55, 255, 139, .12), rgba(0, 0, 0, .25) 52%);
      box-shadow: 0 0 40px rgba(55, 255, 139, .12);
    }
    .edge.main .no { font-size: clamp(40px, 5vw, 76px); text-shadow: 0 0 22px rgba(55, 255, 139, .5); }
    .edge.main h3 { font-size: clamp(28px, 3vw, 44px); }
    .edge.main p { font-size: clamp(15px, 1.5vw, 18px); color: var(--text); }
    .edge .badge { color: var(--bg); background: var(--green); align-self: flex-start; padding: 3px 8px; font: 10px/1 var(--pixel); letter-spacing: .1em; }

    /* ---------- S5 / S6 架构行 ---------- */
    .stack { height: 100%; display: grid; gap: 11px; }
    .layer {
      border: 1px solid var(--line); border-radius: 6px;
      background: rgba(0, 0, 0, .25);
      display: grid; grid-template-columns: 168px 1fr; gap: 18px; align-items: center;
      padding: clamp(13px, 1.5vw, 18px);
      transition: border-color .18s ease, background .18s ease;
    }
    .layer:hover { border-color: rgba(55, 255, 139, .42); background: rgba(55, 255, 139, .04); }
    .layer .lk { color: var(--green); font: 13px/1.3 var(--pixel); letter-spacing: .08em; }
    .layer .lk small { display: block; color: var(--faint); font-size: 11px; letter-spacing: .04em; margin-top: 4px; }
    .layer .lv { color: var(--text); font-size: clamp(15px, 1.5vw, 18px); }
    .layer .lv small { display: block; color: var(--muted); font-size: clamp(12px, 1.2vw, 14px); margin-top: 4px; }

    /* ---------- S7 信号管线 ---------- */
    .route { position: relative; height: 100%; min-height: 420px; border: 1px solid var(--line); border-radius: 6px; background: rgba(0, 0, 0, .24); overflow: hidden; padding: 22px; }
    .route svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; opacity: .8; }
    .route-path { fill: none; stroke: var(--green); stroke-width: 2; stroke-dasharray: 11 9; filter: drop-shadow(0 0 7px rgba(55, 255, 139, .5)); animation: dash 2s linear infinite; }
    .node {
      position: absolute; width: clamp(160px, 21%, 200px); min-height: 96px;
      border: 1px solid var(--line); border-radius: 6px;
      background: rgba(4, 24, 12, .82); padding: 13px; box-shadow: 0 12px 30px rgba(0, 0, 0, .36);
    }
    .node b { color: var(--green); font: 14px/1 var(--pixel); letter-spacing: .08em; }
    .node h3 { margin-top: 10px; font-size: 17px; }
    .node p { margin-top: 5px; color: var(--muted); font-size: 12px; }
    .n1 { left: 4%; top: 10%; } .n2 { left: 38%; top: 6%; } .n3 { right: 4%; top: 20%; }
    .n4 { left: 16%; bottom: 8%; } .n5 { right: 13%; bottom: 6%; }
    .formula { display: flex; flex-wrap: wrap; gap: 8px; }
    .formula span { border: 1px solid var(--line); background: rgba(0, 0, 0, .3); color: var(--green); font: 13px/1 var(--pixel); letter-spacing: .04em; padding: 8px 11px; }
    .formula span em { color: var(--muted); font-style: normal; }

    /* ---------- S8 作战室 ---------- */
    .warroom { display: grid; grid-template-columns: 1.04fr .96fr; gap: 11px; height: 100%; }
    .board, .trace { border: 1px solid var(--line); border-radius: 6px; background: rgba(0, 0, 0, .24); padding: 12px; overflow: hidden; }
    .board { display: grid; align-content: start; gap: 6px; }
    .board .bh { display: flex; justify-content: space-between; color: var(--faint); font: 10px/1 var(--pixel); letter-spacing: .08em; margin-bottom: 4px; }
    .pick {
      display: grid; grid-template-columns: 40px 1fr 58px; align-items: center; gap: 12px; min-height: 32px;
      border: 1px solid rgba(255, 255, 255, .06); background: rgba(255, 255, 255, .03); padding: 6px 10px;
    }
    .pick .pk { color: var(--green); font: 13px/1 var(--pixel); }
    .pick .nm { color: var(--text); font-size: 14px; }
    .pick .cf { color: var(--green); font: 12px/1 var(--pixel); text-align: right; }
    .pick.lock .cf { color: var(--amber); }
    .trace { display: grid; align-content: start; gap: 10px; }
    .gmgrid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
    .gm { aspect-ratio: 1; display: grid; place-items: center; border: 1px solid rgba(55, 255, 139, .16); background: rgba(55, 255, 139, .04); color: var(--faint); font: 8px/1 var(--pixel); }
    .gm.hot { color: var(--green); background: rgba(55, 255, 139, .14); box-shadow: 0 0 12px rgba(55, 255, 139, .22); }
    .log { display: grid; gap: 5px; }
    .log .ln { color: var(--muted); font: 12px/1.45 var(--pixel); letter-spacing: .01em; border-bottom: 1px solid rgba(55, 255, 139, .08); padding-bottom: 5px; }
    .log .ln b { color: var(--green); }
    .log .ln .w { color: var(--amber); }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .metric { border: 1px solid var(--line); background: rgba(0, 0, 0, .26); padding: 12px; display: grid; gap: 4px; }
    .metric strong { color: var(--green); font: clamp(26px, 3vw, 40px)/1 var(--pixel); }
    .metric span { color: var(--muted); font-size: 12px; }

    /* ---------- S9 为什么能赢 ---------- */
    .win { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; height: 100%; }
    .col {
      border: 1px solid var(--line); border-radius: 6px; background: rgba(0, 0, 0, .25);
      padding: clamp(16px, 1.8vw, 24px); display: grid; align-content: start; gap: 12px;
    }
    .col .h { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .col .h b { font-size: clamp(22px, 2.4vw, 32px); }
    .col .h em { color: var(--green); font: clamp(20px, 2.2vw, 30px)/1 var(--pixel); font-style: normal; }
    .col ul { display: grid; gap: 9px; color: var(--muted); font-size: clamp(13px, 1.4vw, 16px); }
    .col li { display: flex; gap: 9px; }
    .col li::before { content: "→"; color: var(--green); font-family: var(--pixel); }

    /* ---------- 入场级联 ---------- */
    .slide.active .stagger > * { animation: itemIn .5s ease both; }
    .stagger > *:nth-child(1) { animation-delay: .04s; }
    .stagger > *:nth-child(2) { animation-delay: .1s; }
    .stagger > *:nth-child(3) { animation-delay: .16s; }
    .stagger > *:nth-child(4) { animation-delay: .22s; }
    .stagger > *:nth-child(5) { animation-delay: .28s; }
    .stagger > *:nth-child(6) { animation-delay: .34s; }

    .ripple {
      position: fixed; width: 16px; height: 16px; border-radius: 50%; pointer-events: none; z-index: 100;
      background: radial-gradient(circle, rgba(55, 255, 139, .3), rgba(55, 255, 139, 0) 68%);
      transform: translate(-50%, -50%) scale(.2); animation: ripple .6s ease-out forwards;
    }

    @keyframes itemIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
    @keyframes evaPop {
      0% { opacity: 0; transform: scale(1.35) rotate(-.8deg); filter: blur(10px); }

    /* ---------- 导航 ---------- */
    const slideEls = [...document.querySelectorAll(".slide")];
    const dotEls = [...document.querySelectorAll(".dot")];
    dotEls.forEach(b => b.addEventListener("click", () => document.getElementById(b.dataset.target).scrollIntoView({ behavior: "smooth" })));

    function setActive(index) {
      slideEls.forEach((el, i) => el.classList.toggle("active", i === index));
      dotEls.forEach((d, i) => d.setAttribute("aria-current", i === index ? "true" : "false"));
      counter.innerHTML = `<b>${pad(index + 1)}</b> / ${pad(slideEls.length)}`;
      progress.style.width = `${((index + 1) / slideEls.length) * 100}%`;
    }
    const io = new IntersectionObserver((entries) => {
      const v = entries.filter(e => e.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (v) setActive(Number(v.target.dataset.index));
    }, { threshold: [.5, .7] });
    slideEls.forEach(el => io.observe(el));
    setActive(0);

    document.addEventListener("keydown", (e) => {
      const a = slideEls.findIndex(el => el.classList.contains("active"));
      let n = a;
      if (["ArrowDown", "PageDown", " "].includes(e.key)) n = Math.min(slideEls.length - 1, a + 1);
      if (["ArrowUp", "PageUp"].includes(e.key)) n = Math.max(0, a - 1);
      if (e.key === "Home") n = 0;
      if (e.key === "End") n = slideEls.length - 1;
      if (n !== a) { e.preventDefault(); slideEls[n].scrollIntoView({ behavior: "smooth" }); }
    });

    /* ---------- 点击涟漪 ---------- */
    document.addEventListener("click", (e) => {
      if (!(e.target instanceof Element) || !e.target.closest("button,.pick,.edge,.layer,.sig")) return;
      const r = document.createElement("span");
      r.className = "ripple"; r.style.left = `${e.clientX}px`; r.style.top = `${e.clientY}px`;
      document.body.appendChild(r); setTimeout(() => r.remove(), 640);
    });

    /* ---------- Matrix 数据雨 ---------- */
    function setupMatrix(canvas) {
      const ctx = canvas.getContext("2d");
      let w = 0, h = 0, dpr = 1, drops = [];
      const chars = "01DRAFTGMLOCKSIM市场天赋资金顺位回到选秀夜AWS背离";
      let font = '15px ui-monospace, Menlo, monospace';
      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = canvas.clientWidth; h = canvas.clientHeight;
        canvas.width = Math.max(1, Math.floor(w * dpr));
        canvas.height = Math.max(1, Math.floor(h * dpr));
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        drops = Array.from({ length: Math.ceil(w / 18) }, () => Math.random() * -h);
      }
      function draw() {
        ctx.fillStyle = "rgba(0,4,2,.16)"; ctx.fillRect(0, 0, w, h);
        ctx.font = font;
        for (let i = 0; i < drops.length; i++) {
          const x = i * 18, y = drops[i];
          ctx.fillStyle = Math.random() > .986 ? "#effff5" : "rgba(0,255,102,.7)";
          ctx.fillText(chars[Math.floor(Math.random() * chars.length)], x, y);
          drops[i] += 18 + Math.random() * 7;
          if (drops[i] > h + 40 && Math.random() > .975) drops[i] = Math.random() * -160;
        }
        requestAnimationFrame(draw);
      }
      window.addEventListener("resize", resize);
      resize(); draw();
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => { font = '15px "FusionPixel12", ui-monospace, monospace'; });
      }
    }
    document.querySelectorAll(".matrix").forEach(setupMatrix);
  </script>
</body>
