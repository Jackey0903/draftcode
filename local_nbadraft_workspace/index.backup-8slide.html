<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>QUANTDRAFT 30 · 选秀作战室</title>
  <style>
    :root {
      --bg: #000402;
      --bg2: #020805;
      --panel: rgba(3, 18, 9, .78);
      --panel2: rgba(4, 32, 15, .68);
      --text: #f4fff8;
      --muted: #8caf9b;
      --faint: #4b725c;
      --green: #37ff8b;
      --green-hot: #00ff66;
      --amber: #f1c96b;
      --cyan: #62f2ff;
      --red: #ff4473;
      --line: rgba(55, 255, 139, .22);
      --line-soft: rgba(55, 255, 139, .08);
      --shadow: 0 24px 80px rgba(0, 0, 0, .56);
      --display: "DeyiHei", "得意黑", "SmileySans-Oblique", "PingFang SC", "Microsoft YaHei", sans-serif;
      --pixel: "OCR-A BT", "OCR-B 10 BT", ui-monospace, Menlo, Monaco, Consolas, monospace;
      --body: Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      background: #000;
    }
    body {
      color: var(--text);
      font-family: var(--body);
      overflow-x: hidden;
      background: #000;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { font: inherit; color: inherit; }

    .progress {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 80;
      height: 3px;
      width: 0;
      background: linear-gradient(90deg, var(--green-hot), var(--cyan));
      box-shadow: 0 0 18px rgba(55, 255, 139, .72);
      transition: width .18s ease;
    }

    .rail {
      position: fixed;
      right: clamp(10px, 1.5vw, 22px);
      top: 50%;
      transform: translateY(-50%);
      z-index: 70;
      display: grid;
      justify-items: center;
      gap: 12px;
    }
    .counter {
      color: rgba(244, 255, 248, .74);
      writing-mode: vertical-rl;
      font: 800 12px/1 var(--pixel);
      letter-spacing: .15em;
    }
    .counter b { color: var(--green); }
    .dots { display: grid; gap: 9px; }
    .dot {
      width: 10px;
      height: 10px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(244, 255, 248, .36);
      background: rgba(0, 0, 0, .25);
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .dot:hover,
    .dot[aria-current="true"] {
      transform: scale(1.22);
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 0 5px rgba(55, 255, 139, .13), 0 0 18px rgba(55, 255, 139, .72);
    }

    .slide {
      position: relative;
      min-height: 100svh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow: hidden;
      isolation: isolate;
      padding: clamp(26px, 4vw, 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(980px 560px at 76% 12%, rgba(0, 255, 102, .12), transparent 64%),
        radial-gradient(700px 500px at 11% 90%, rgba(98, 242, 255, .06), transparent 68%),
        var(--bg);
    }
    .slide::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -5;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(55, 255, 139, .06) 1px, transparent 1px) 0 0 / 72px 100%,
        linear-gradient(rgba(244, 255, 248, .025) 1px, transparent 1px) 0 0 / 100% 44px;
      opacity: .82;
      mask-image: radial-gradient(110% 92% at 50% 42%, #000 46%, transparent 100%);
    }
    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      opacity: .2;
      background:
        linear-gradient(transparent 50%, rgba(0, 0, 0, .16) 50%) 0 0 / 100% 4px,
        radial-gradient(closest-side at 50% 50%, transparent 68%, rgba(0, 0, 0, .65));
    }
    .matrix {
      position: absolute;
      inset: 0;
      z-index: -6;
      width: 100%;
      height: 100%;
      opacity: .28;
    }
    .cover .matrix,
    .lock .matrix { opacity: .86; }
    .grain {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      opacity: .22;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0.44 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }

    .frame {
      position: relative;
      z-index: 2;
      width: min(1240px, calc(100vw - clamp(48px, 9vw, 132px)));
      min-height: min(740px, calc(100svh - 70px));
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 2vh, 24px);
    }
    .topline,
    .takeaway {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      color: var(--muted);
      font: 850 12px/1.2 var(--pixel);
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      white-space: nowrap;
    }
    .tag::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 18px rgba(55, 255, 139, .8);
    }
    .takeaway {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      text-transform: none;
      letter-spacing: 0;
      font-family: var(--body);
      color: var(--text);
      font-size: clamp(14px, 1.35vw, 18px);
    }
    .takeaway b {
      color: var(--green);
      font-family: var(--pixel);
      letter-spacing: .16em;
      text-transform: uppercase;
      font-size: 11px;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      gap: clamp(18px, 3vw, 38px);
      align-items: stretch;
    }
    .main.single { grid-template-columns: 1fr; }

    .hero,
    .panel,
    .glass {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,.045), transparent), var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.18);
    }
    .hero {
      padding: clamp(28px, 4vw, 54px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .panel {
      padding: clamp(18px, 2.4vw, 30px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .hero::after,
    .panel::after,
    .glass::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(105deg, rgba(255,255,255,.11), transparent 28%, transparent 76%, rgba(55,255,139,.08));
      opacity: .34;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--green);
      font: 900 12px/1 var(--pixel);
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .eyebrow::after {
      content: "";
      width: 72px;
      height: 1px;
      background: linear-gradient(90deg, var(--green), transparent);
    }
    h1, h2, h3, p { margin: 0; }
    .title {
      margin-top: 18px;
      color: var(--text);
      font-family: var(--display);
      font-size: clamp(42px, 6.4vw, 90px);
      line-height: .94;
      letter-spacing: -.055em;
      font-weight: 950;
    }
    .title.skew {
      transform: skewX(-7deg);
      transform-origin: left center;
    }
    .title.glitch {
      text-shadow:
        0 0 20px rgba(0,255,102,.6),
        0 0 64px rgba(0,255,102,.24),
        2px 0 rgba(255,68,115,.72),
        -2px 0 rgba(98,242,255,.48);
      animation: glitch-word 2.8s steps(2) infinite;
    }
    .lead {
      margin-top: 18px;
      color: var(--text);
      font-size: clamp(19px, 2.35vw, 32px);
      line-height: 1.22;
      font-weight: 850;
    }
    .body {
      margin-top: 18px;
      color: var(--muted);
      font-size: clamp(15px, 1.35vw, 19px);
      max-width: 34em;
    }

    .cover-kicker {
      position: absolute;
      left: clamp(48px, 7vw, 110px);
      top: clamp(44px, 7vh, 78px);
      color: var(--green);
      font: 900 14px/1 var(--pixel);
      letter-spacing: .22em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(55,255,139,.7);
      animation: fade-up .45s ease .1s both;
    }
    .eva-title {
      position: absolute;
      left: clamp(48px, 7vw, 110px);
      top: 25%;
      font-family: var(--display);
      font-size: clamp(66px, 14vw, 192px);
      line-height: .78;
      letter-spacing: -.075em;
      font-weight: 950;
      color: #f4fff8;
      white-space: nowrap;
      text-shadow:
        0 0 18px rgba(0,255,102,.62),
        0 0 58px rgba(0,255,102,.26),
        3px 0 rgba(255,68,115,.72),
        -3px 0 rgba(98,242,255,.5);
      animation: eva-glitch-pop .68s cubic-bezier(.18,.85,.25,1) .08s both;
    }
    .vertical {
      position: absolute;
      top: 8%;
      right: clamp(36px, 7vw, 112px);
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-family: "Hiragino Mincho ProN", "Songti SC", "STSong", "MingLiU", serif;
      font-size: clamp(52px, 8.2vw, 132px);
      line-height: .9;
      font-weight: 900;
      letter-spacing: -.08em;
      color: #fff;
      text-shadow:
        0 0 8px rgba(255,255,255,.68),
        0 0 28px rgba(0,255,102,.38),
        2px 0 rgba(255,68,115,.5),
        -2px 0 rgba(98,242,255,.35);
      animation: eva-glitch-pop .62s cubic-bezier(.18,.85,.25,1) .28s both;
    }
    .cover-line {
      position: absolute;
      left: clamp(54px, 7vw, 118px);
      bottom: clamp(54px, 8vh, 100px);
      color: #fff;
      font-family: "Hiragino Mincho ProN", "Songti SC", "STSong", "MingLiU", serif;
      font-size: clamp(24px, 3.2vw, 52px);
      font-weight: 900;
      letter-spacing: .12em;
      text-shadow: 0 0 20px rgba(255,255,255,.4);
      animation: eva-pop .5s cubic-bezier(.18,.85,.25,1) .48s both;
    }
    .flash {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: #fff;
      animation: eva-flash .48s ease-out .05s both;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .chip {
      border: 1px solid var(--line);
      background: rgba(0,0,0,.26);
      min-height: 48px;
      padding: 10px;
      display: grid;
      gap: 6px;
      color: var(--muted);
      font: 850 11px/1.2 var(--pixel);
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .chip b {
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0;
    }
    .chip b::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-right: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px rgba(55,255,139,.86);
    }

    .vs {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 18px;
      align-items: stretch;
    }
    .side {
      border: 1px solid var(--line);
      background: rgba(0,0,0,.26);
      padding: 24px;
      display: grid;
      align-content: center;
      gap: 18px;
      transform: skewX(-5deg);
      overflow: hidden;
    }
    .side > * { transform: skewX(5deg); }
    .side h3 {
      font-family: var(--display);
      font-size: clamp(30px, 4vw, 54px);
      line-height: 1;
    }
    .side ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
      color: var(--muted);
      font-size: 15px;
    }
    .divider {
      position: relative;
      width: 1px;
      background: linear-gradient(transparent, var(--green), transparent);
    }
    .divider::before {
      content: "≠";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: var(--amber);
      font: 900 48px/1 var(--pixel);
      text-shadow: 0 0 18px rgba(241,201,107,.62);
    }

    .route {
      position: relative;
      height: 100%;
      min-height: 430px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.24);
      overflow: hidden;
      padding: 26px;
    }
    .route svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: .82;
    }
    .route-path {
      fill: none;
      stroke: var(--green);
      stroke-width: 2;
      stroke-dasharray: 12 9;
      filter: drop-shadow(0 0 8px rgba(55,255,139,.5));
      animation: dash 1.8s linear infinite;
    }
    .node {
      position: absolute;
      width: 190px;
      min-height: 104px;
      border: 1px solid var(--line);
      background: rgba(4, 24, 12, .78);
      padding: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,.38);
    }
    .node b {
      color: var(--green);
      font: 900 14px/1 var(--pixel);
      letter-spacing: .12em;
    }
    .node h3 {
      margin-top: 12px;
      font-size: 17px;
    }
    .node p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .n1 { left: 6%; top: 12%; }
    .n2 { left: 36%; top: 9%; }
    .n3 { right: 6%; top: 22%; }
    .n4 { left: 18%; bottom: 10%; }
    .n5 { right: 16%; bottom: 8%; }

    .coverflow {
      height: 100%;
      min-height: 470px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.24);
      position: relative;
      overflow: hidden;
      perspective: 1200px;
    }
    .flow-card {
      position: absolute;
      top: 54px;
      left: 50%;
      width: min(360px, 42vw);
      height: 300px;
      margin-left: calc(min(360px, 42vw) / -2);
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), transparent),
        rgba(3, 22, 11, .92);
      box-shadow: 0 24px 70px rgba(0,0,0,.55);
      padding: 22px;
      transition: transform .55s cubic-bezier(.2,.8,.2,1), opacity .55s ease, filter .55s ease;
      transform-style: preserve-3d;
    }
    .flow-card h3 {
      color: var(--text);
      font-family: var(--display);
      font-size: 32px;
      line-height: 1.05;
      letter-spacing: -.03em;
    }
    .flow-card p {
      margin-top: 18px;
      color: var(--muted);
      font-size: 15px;
    }
    .flow-card .big {
      position: absolute;
      right: 18px;
      bottom: 14px;
      color: var(--green);
      font: 900 54px/1 var(--pixel);
      text-shadow: 0 0 18px rgba(55,255,139,.55);
    }
    .flow-card.active {
      border-color: rgba(55,255,139,.72);
      box-shadow: 0 24px 70px rgba(0,0,0,.55), 0 0 36px rgba(55,255,139,.16);
    }
    .flow-meta {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .flow-meta span {
      color: var(--muted);
      font: 850 12px/1.4 var(--pixel);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.28);
      color: var(--green);
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .icon-btn:hover {
      transform: translateY(-1px);
      background: rgba(55,255,139,.1);
      border-color: rgba(55,255,139,.5);
    }
    .icon-btn:active { transform: translateY(1px); filter: brightness(.92); }

    .warroom {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 12px;
      height: 100%;
    }
    .board,
    .trace,
    .mini-grid {
      border: 1px solid var(--line);
      background: rgba(0,0,0,.24);
      padding: 12px;
    }
    .pick {
      display: grid;
      grid-template-columns: 44px 1fr 70px;
      align-items: center;
      gap: 12px;
      min-height: 34px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.035);
      padding: 7px 10px;
      color: var(--muted);
      font: 850 12px/1 var(--pixel);
    }
    .pick + .pick { margin-top: 6px; }
    .pick b { color: var(--text); }
    .pick em {
      color: var(--green);
      font-style: normal;
      text-align: right;
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .gm {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid rgba(55,255,139,.18);
      background: rgba(55,255,139,.045);
      color: var(--muted);
      font: 850 10px/1 var(--pixel);
    }
    .gm.hot {
      color: var(--green);
      background: rgba(55,255,139,.12);
      box-shadow: 0 0 16px rgba(55,255,139,.2);
    }
    .log {
      color: var(--muted);
      font: 850 12px/1.5 var(--pixel);
      border: 1px solid rgba(55,255,139,.14);
      background: rgba(0,0,0,.25);
      padding: 12px;
      margin-bottom: 8px;
    }
    .log b { color: var(--green); }
    .log .warn { color: var(--amber); }

    .arch {
      height: 100%;
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      gap: 12px;
    }
    .arch-row {
      border: 1px solid var(--line);
      background: rgba(0,0,0,.25);
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 18px;
      align-items: center;
      padding: 16px;
      transform: skewX(-3deg);
    }
    .arch-row > * { transform: skewX(3deg); }
    .arch-row b {
      color: var(--green);
      font: 900 13px/1.2 var(--pixel);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .arch-row span {
      color: var(--text);
      font-size: 16px;
      font-weight: 760;
    }
    .arch-row small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      font-size: 13px;
    }

    .terminal {
      height: 100%;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.34);
      padding: 18px;
      display: grid;
      gap: 10px;
      align-content: start;
      font-family: var(--pixel);
      overflow: hidden;
    }
    .term-line {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      border-bottom: 1px solid rgba(55,255,139,.08);
      padding-bottom: 9px;
    }
    .term-line b { color: var(--green); }
    .term-line .warn { color: var(--amber); }
    .term-line .bad { color: var(--red); }

    .metric-band {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .metric {
      border: 1px solid var(--line);
      background: rgba(0,0,0,.25);
      padding: 18px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .metric strong {
      color: var(--green);
      font: 900 clamp(38px, 5vw, 64px)/1 var(--pixel);
    }
    .metric span {
      color: var(--muted);
      font-size: 14px;
    }

    .reveal {
      opacity: 1;
      transform: none;
    }
    .slide.active .item {
      animation: item-in .5s ease both;
      animation-delay: calc(var(--i, 0) * 70ms);
    }

    .ripple {
      position: fixed;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      background: radial-gradient(circle, rgba(55,255,139,.32), rgba(55,255,139,0) 68%);
      transform: translate(-50%, -50%) scale(.2);
      animation: ripple .6s ease-out forwards;
    }

    @keyframes item-in {
      from { opacity: .55; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes eva-pop {
      0% { opacity: 0; transform: scale(1.45) rotate(-1deg); filter: blur(14px); }
      55% { opacity: 1; transform: scale(.92) rotate(.35deg); filter: blur(0); }
      78% { transform: scale(1.04) rotate(-.18deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); filter: blur(0); }
    }
    @keyframes eva-glitch-pop {
      0% { opacity: 0; transform: scale(1.55) rotate(-1.3deg); filter: blur(16px); }
      48% { opacity: 1; transform: scale(.9) translateX(-3px) rotate(.3deg); filter: blur(0) hue-rotate(20deg); }
      58% { transform: scale(1.06) translateX(4px) rotate(-.2deg); }
      68% { transform: scale(.98) translateX(-1px); }
      100% { opacity: 1; transform: scale(1) translateX(0) rotate(0); filter: blur(0); }
    }
    @keyframes eva-flash {
      0% { opacity: .88; }
      35% { opacity: .12; }
      100% { opacity: 0; }
    }
    @keyframes glitch-word {
      0%, 86%, 100% { transform: none; filter: none; }
      88% { transform: translateX(-3px); filter: hue-rotate(18deg); }
      90% { transform: translateX(3px); }
      92% { transform: translateX(-1px); }
    }
    @keyframes dash {
      to { stroke-dashoffset: -42; }
    }
    @keyframes ripple {
      to { opacity: 0; transform: translate(-50%, -50%) scale(8); }
    }

    @media (max-width: 980px) {
      .frame { width: calc(100vw - 38px); min-height: auto; }
      .main, .warroom { grid-template-columns: 1fr; }
      .chips, .metric-band { grid-template-columns: repeat(2, 1fr); }
      .vs { grid-template-columns: 1fr; }
      .divider { width: 100%; height: 1px; }
      .side, .arch-row { transform: none; }
      .side > *, .arch-row > * { transform: none; }
      .coverflow { min-height: 520px; }
      .rail { display: none; }
      .eva-title { left: 24px; font-size: clamp(56px, 18vw, 112px); }
      .vertical { right: 20px; font-size: clamp(42px, 12vw, 82px); }
      .cover-line { left: 28px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
      .matrix { opacity: .16 !important; }
    }
  </style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <nav class="rail" aria-label="幻灯片导航">
    <div class="counter" id="counter"><b>01</b> / 08</div>
    <div class="dots" id="dots"></div>
  </nav>
  <main id="deck"></main>

  <script>
    const DATA = {
      project: "QUANTDRAFT 30",
      subtitle: "选秀作战室",
      thesis: "把「数据与市场的背离」变成 alpha",
      board: [
        ["01", "WAS · Player A", "LOCK"],
        ["02", "UTA · Player B", "78%"],
        ["03", "MEM · Player C", "71%"],
        ["04", "CHI · Player D", "63%"],
        ["05", "LAC · Player E", "58%"],
        ["06", "BKN · Player F", "52%"],
        ["07", "NOP · Player G", "49%"],
        ["08", "SAS · Player H", "44%"]
      ]
    };

    const slides = [
      {
        type: "cover",
        id: "cover",
        section: "T00 + SYSTEM WAKE",
        vertical: "選秀作戰室",
        line: "把分歧變成 alpha"
      },
      {
        type: "split",
        id: "insight",
        section: "01 / CORE CONTRADICTION",
        title: "天赋 ≠ 顺位",
        lead: "真正有价值的不是单边预测,而是数据与市场的背离。",
        take: "背离不是噪声,是选秀预测里最值得深挖的信号。",
        left: ["谁更强?", ["速率指标", "高阶数据", "身体条件", "年龄修正"]],
        right: ["谁会被选?", ["球队需求", "市场共识", "GM 偏好", "实时情报"]]
      },
      {
        type: "route",
        id: "pipeline",
        section: "02 / SIGNAL ROUTE",
        title: "一致锁定,背离深挖",
        lead: "五层知识底座进入双信号融合,再交给 GM 博弈和模拟引擎。",
        take: "同一套引擎既出名单,也顺手回答客观题。",
        nodes: [
          ["01", "Talent", "指标手册、体测、位置 Z-score。"],
          ["02", "Market", "多家 mock 聚合,历史命中率加权。"],
          ["03", "Divergence", "背离点触发 Agent 深推理。"],
          ["04", "30 GM", "球队需求与人格档案注入。"],
          ["05", "Monte Carlo", "1000 次采样得到置信分布。"]
        ]
      },
      {
        type: "coverflow",
        id: "coverflow",
        section: "03 / PROCESS BROWSER",
        title: "不是一张榜,是一条作战链",
        lead: "用 CoverFlow 把五层底座和五个创新点做成可讲的过程浏览。",
        take: "评委看到的不是功能堆叠,而是一条从输入到审计的主线。",
        cards: [
          ["01", "球员层", "速率指标、体测、年龄修正,回答谁更强。"],
          ["02", "球队层", "30 队顺位、阵容缺口、GM 历史偏好。"],
          ["03", "市场层", "mock 共识与历史命中率,作为预测锚点。"],
          ["04", "实时层", "试训、交易传闻、伤病和最后 48 小时情报。"],
          ["05", "审计层", "每个 pick 留下理由、证据、置信度和红队挑战。"]
        ]
      },
      {
        type: "warroom",
        id: "warroom",
        section: "04 / LIVE WAR ROOM",
        title: "30 位 GM,推演上千次",
        lead: "每队带独立决策 DNA,蒙特卡洛负责把不确定性摊开。",
        take: "概率化不是软弱,是诚实标注每个顺位的不确定性。",
      },
      {
        type: "architecture",
        id: "architecture",
        section: "05 / AWS NATIVE",
        title: "云原生不是堆服务",
        lead: "重活进 Fargate,推理进 Bedrock Agents,模拟进 Step Functions。",
        take: "用云的弹性,做单机做不到的不确定性量化。",
        rows: [
          ["采集层", "EventBridge -> Fargate 爬虫 -> S3", "headless 浏览器抓 mock、新闻和实时情报。"],
          ["知识底座", "DynamoDB + Bedrock KB", "数字确定性查询,散文报告进入 RAG。"],
          ["多智能体", "Commissioner + Scouts + Market + News + Red Team", "Supervisor 编排,子 Agent 各自带工具与 trace。"],
          ["模拟引擎", "Step Functions Distributed Map", "并行跑 1000 次选秀,输出边际概率。"],
          ["安全层", "Guardrails + KMS + IAM + X-Ray", "防注入、加密、最小权限、全程可观测。"]
        ]
      },
      {
        type: "audit",
        id: "audit",
        section: "06 / AUDIT TRACE",
        title: "每个顺位都能展示思考",
        lead: "红队挑战不是装饰,它让系统敢把理由和置信度交给评委看。",
        take: "可审计推理,把规则约束变成路演素材。"
      },
      {
        type: "lock",
        id: "lock",
        section: "07 / SUBMISSION LOCK",
        vertical: "提交鎖定",
        line: "Prediction is not a list. It is a war room."
      }
    ];

    const deck = document.getElementById("deck");
    const dots = document.getElementById("dots");
    const progress = document.getElementById("progress");
    const counter = document.getElementById("counter");

    const matrixCanvas = () => '<canvas class="matrix" aria-hidden="true"></canvas><div class="grain"></div>';
    const topLine = (s, i) => `<header class="topline"><span class="tag">${s.section}</span><span>${String(i + 1).padStart(2, "0")} / ${String(slides.length).padStart(2, "0")}</span></header>`;
    const take = (s) => `<footer class="takeaway"><b>Takeaway</b><span>${s.take || s.line}</span></footer>`;
    const intro = (s, extra = "") => `<section class="hero"><div><div class="eyebrow">${s.section}</div><h1 class="title skew ${extra}">${s.title}</h1><p class="lead">${s.lead}</p></div></section>`;

    function renderSlide(s, i) {
      if (s.type === "cover" || s.type === "lock") {
        return `<section class="slide ${s.type}" id="${s.id}" data-index="${i}">
          ${matrixCanvas()}<div class="flash"></div>
          <div class="cover-kicker">${s.section}</div>
          <div class="eva-title">${s.type === "cover" ? DATA.project : "LOCKED"}</div>
          <div class="vertical">${s.vertical}</div>
          <div class="cover-line">${s.line}</div>
        </section>`;
      }
      let visual = "";
      if (s.type === "split") {
        visual = `<section class="panel"><div class="vs"><article class="side item"><h3>${s.left[0]}</h3><ul>${s.left[1].map(x => `<li>${x}</li>`).join("")}</ul></article><div class="divider"></div><article class="side item" style="--i:1"><h3>${s.right[0]}</h3><ul>${s.right[1].map(x => `<li>${x}</li>`).join("")}</ul></article></div></section>`;
      } else if (s.type === "route") {
        visual = `<section class="panel"><div class="route">
          <svg viewBox="0 0 1000 520" preserveAspectRatio="none"><path class="route-path" d="M120 105 C300 40 345 90 470 115 S730 120 840 185 C940 270 770 420 620 420 S300 440 260 370 C225 310 330 270 500 265"/></svg>
          ${s.nodes.map((n, idx) => `<article class="node n${idx + 1} item" style="--i:${idx}"><b>${n[0]}</b><h3>${n[1]}</h3><p>${n[2]}</p></article>`).join("")}
        </div></section>`;
      } else if (s.type === "coverflow") {
        visual = `<section class="panel"><div class="coverflow" id="coverflow">${s.cards.map((c, idx) => `<article class="flow-card" data-flow-card="${idx}"><h3>${c[1]}</h3><p>${c[2]}</p><div class="big">${c[0]}</div></article>`).join("")}<div class="flow-meta"><button class="icon-btn" type="button" data-flow-prev aria-label="上一个">‹</button><span id="flowLabel">Process / 01</span><button class="icon-btn" type="button" data-flow-next aria-label="下一个">›</button></div></div></section>`;
      } else if (s.type === "warroom") {
        visual = `<section class="panel"><div class="chips"><div class="chip"><span>GM Agents</span><b>30 ONLINE</b></div><div class="chip"><span>Simulation</span><b>1000 RUNS</b></div><div class="chip"><span>Mode</span><b>MONTE CARLO</b></div><div class="chip"><span>Output</span><b>CONFIDENCE</b></div></div><div class="warroom"><div class="board">${DATA.board.map((p, idx) => `<div class="pick item" style="--i:${idx}"><span>${p[0]}</span><b>${p[1]}</b><em>${p[2]}</em></div>`).join("")}</div><div class="trace"><div class="mini-grid">${Array.from({ length: 30 }, (_, idx) => `<div class="gm ${idx % 7 === 0 ? "hot" : ""}">GM${String(idx + 1).padStart(2, "0")}</div>`).join("")}</div><div class="log"><b>commissioner.trace</b> -> preference functions loaded</div><div class="log"><b>marginal.probability</b> -> slot confidence calibrated</div></div></div></section>`;
      } else if (s.type === "architecture") {
        visual = `<section class="panel"><div class="arch">${s.rows.map((r, idx) => `<div class="arch-row item" style="--i:${idx}"><b>${r[0]}</b><span>${r[1]}<small>${r[2]}</small></span></div>`).join("")}</div></section>`;
      } else if (s.type === "audit") {
        visual = `<section class="panel"><div class="terminal"><div class="term-line"><b>$ commissioner.run</b> --slot 04 --team CHI --mode explainable</div><div class="term-line"><b>market_gap</b> detected: talent rank 11 / market rank 26</div><div class="term-line"><b>scout.review</b> -> upside signal confirmed, shooting risk medium</div><div class="term-line"><b>gm.fit</b> -> roster need wing creation, risk tolerance high</div><div class="term-line"><span class="warn">red_team.challenge</span> -> overfitting box score? checking live intel</div><div class="term-line"><b>final.pick</b> -> Player D · confidence 63%</div></div><div class="metric-band"><div class="metric"><strong>63%</strong><span>slot confidence</span></div><div class="metric"><strong>05</strong><span>evidence refs</span></div><div class="metric"><strong>ON</strong><span>audit trail</span></div></div></section>`;
      }
      return `<section class="slide" id="${s.id}" data-index="${i}">${matrixCanvas()}<div class="frame">${topLine(s, i)}<main class="main">${intro(s, s.type === "split" ? "glitch" : "")}${visual}</main>${take(s)}</div></section>`;
    }

    deck.innerHTML = slides.map(renderSlide).join("");
    dots.innerHTML = slides.map((s, i) => `<button class="dot" type="button" data-target="${s.id}" aria-label="跳到第 ${i + 1} 页"></button>`).join("");

    const slideEls = [...document.querySelectorAll(".slide")];
    const dotEls = [...document.querySelectorAll(".dot")];

    dotEls.forEach(button => {
      button.addEventListener("click", () => document.getElementById(button.dataset.target).scrollIntoView({ behavior: "smooth" }));
    });

    function setActive(index) {
      slideEls.forEach((slide, i) => slide.classList.toggle("active", i === index));
      dotEls.forEach((dot, i) => dot.setAttribute("aria-current", i === index ? "true" : "false"));
      counter.innerHTML = `<b>${String(index + 1).padStart(2, "0")}</b> / ${String(slideEls.length).padStart(2, "0")}`;
      progress.style.width = `${((index + 1) / slideEls.length) * 100}%`;
    }

    const observer = new IntersectionObserver((entries) => {
      const visible = entries.filter(e => e.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (visible) setActive(Number(visible.target.dataset.index));
    }, { threshold: [.56, .72] });
    slideEls.forEach(slide => observer.observe(slide));
    setActive(0);

    document.addEventListener("keydown", event => {
      const active = slideEls.findIndex(slide => slide.classList.contains("active"));
      let next = active;
      if (["ArrowDown", "PageDown", " "].includes(event.key)) next = Math.min(slideEls.length - 1, active + 1);
      if (["ArrowUp", "PageUp"].includes(event.key)) next = Math.max(0, active - 1);
      if (event.key === "Home") next = 0;
      if (event.key === "End") next = slideEls.length - 1;
      if (next !== active) {
        event.preventDefault();
        slideEls[next].scrollIntoView({ behavior: "smooth" });
      }
    });

    let flowIndex = 0;
    const flowCards = [...document.querySelectorAll("[data-flow-card]")];
    const flowLabel = document.getElementById("flowLabel");
    function updateFlow() {
      flowCards.forEach((card, i) => {
        let d = i - flowIndex;
        if (d > 2) d -= flowCards.length;
        if (d < -2) d += flowCards.length;
        const hidden = Math.abs(d) > 2;
        card.classList.toggle("active", d === 0);
        card.style.opacity = hidden ? "0" : String(1 - Math.abs(d) * .2);
        card.style.filter = hidden ? "brightness(.4)" : `brightness(${1 - Math.abs(d) * .16})`;
        card.style.transform = `translateX(${d * 190}px) translateZ(${-Math.abs(d) * 110}px) rotateY(${d * -42}deg) scale(${1 - Math.abs(d) * .06})`;
        card.style.zIndex = String(10 - Math.abs(d));
      });
      if (flowLabel) flowLabel.textContent = `Process / ${String(flowIndex + 1).padStart(2, "0")}`;
    }
    document.querySelector("[data-flow-prev]")?.addEventListener("click", () => { flowIndex = (flowIndex - 1 + flowCards.length) % flowCards.length; updateFlow(); });
    document.querySelector("[data-flow-next]")?.addEventListener("click", () => { flowIndex = (flowIndex + 1) % flowCards.length; updateFlow(); });
    updateFlow();

    document.addEventListener("click", event => {
      if (!(event.target instanceof Element)) return;
      if (!event.target.closest("button,.pick,.chip,.flow-card")) return;
      const ripple = document.createElement("span");
      ripple.className = "ripple";
      ripple.style.left = `${event.clientX}px`;
      ripple.style.top = `${event.clientY}px`;
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 650);
    });

    function setupMatrix(canvas) {
      const ctx = canvas.getContext("2d");
      let width = 0;
      let height = 0;
      let dpr = 1;
      let drops = [];
      const chars = "01DRAFTGMLOCKSIM市场天赋顺位回到选秀夜AWS";
      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = canvas.clientWidth;
        height = canvas.clientHeight;
        canvas.width = Math.max(1, Math.floor(width * dpr));
        canvas.height = Math.max(1, Math.floor(height * dpr));
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        drops = Array.from({ length: Math.ceil(width / 18) }, () => Math.random() * -height);
      }
      function draw() {
        ctx.fillStyle = "rgba(0, 4, 2, .16)";
        ctx.fillRect(0, 0, width, height);
        ctx.font = "15px ui-monospace, Menlo, Monaco, Consolas, monospace";
        for (let i = 0; i < drops.length; i++) {
          const x = i * 18;
          const y = drops[i];
          ctx.fillStyle = Math.random() > .986 ? "#effff5" : "rgba(0,255,102,.72)";
          ctx.fillText(chars[Math.floor(Math.random() * chars.length)], x, y);
          drops[i] += 18 + Math.random() * 7;
          if (drops[i] > height + 40 && Math.random() > .975) drops[i] = Math.random() * -160;
        }
        requestAnimationFrame(draw);
      }
      window.addEventListener("resize", resize);
      resize();
      draw();
    }
    document.querySelectorAll(".matrix").forEach(setupMatrix);
  </script>
</body>
</html>
